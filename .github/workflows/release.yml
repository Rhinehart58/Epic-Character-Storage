name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npx electron-builder --mac dmg zip --publish never --config.mac.identity=null
            artifact_glob: dist/*.dmg
          - os: windows-latest
            build_cmd: npx electron-builder --win nsis --x64 --publish never
            artifact_glob: dist/*setup*.exe
          - os: ubuntu-latest
            build_cmd: npx electron-builder --linux AppImage deb --publish never
            artifact_glob: dist/*.AppImage

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          ${{ matrix.build_cmd }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*setup*.exe
            dist/*.AppImage
            dist/*.deb
