name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: macos
          - os: windows-latest
            build_cmd: npx electron-builder --win nsis --x64 --publish never
          - os: ubuntu-latest
            build_cmd: npx electron-builder --linux AppImage deb --publish never

    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          npm run build
          if [[ "${{ matrix.build_cmd }}" == "macos" ]]; then
            if [[ -n "${APPLE_ID}" && -n "${APPLE_APP_SPECIFIC_PASSWORD}" && -n "${APPLE_TEAM_ID}" ]]; then
              echo "Building signed/notarized macOS release..."
              npx electron-builder --mac dmg zip --publish never
            else
              echo "::warning::Missing Apple signing/notarization secrets. Building unsigned macOS artifact (may be flagged as damaged by Gatekeeper)."
              npx electron-builder --mac dmg zip --publish never --config.mac.identity=null
            fi
          else
            ${{ matrix.build_cmd }}
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*setup*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.yaml
            dist/*.blockmap

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*setup*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.yml
            release-assets/**/*.yaml
            release-assets/**/*.blockmap
