# Continuous integration: catch TypeScript breakage before merge.
# Lint is run locally (`npm run lint`); CI uses `verify` until ESLint is clean repo-wide.
name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Require update log entry for app changes
        run: node scripts/verify-update-log-change.mjs
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_BASE_REF: ${{ github.base_ref }}

      - name: Typecheck (main + renderer)
        run: npm run verify
